services:
  backend:
    build: ./backend
    container_name: server-backend
    restart: unless-stopped
    expose:
      - "8000"
    ports:
      - "8000:8000" # 로컬/LAN 직접 접근용 (원하면 제거)
    # .env 전체를 전달 (AUTH_USERS/SESSION_SECRET/<id>_GOOGLE_* 등 동적 키 포함).
    # environment가 env_file보다 우선하므로, 백엔드에 불필요한 값은 여기서 덮어 제거.
    env_file:
      - .env
    environment:
      # 컨테이너 내부 저장소 경로는 항상 마운트 지점으로 고정
      STORAGE_ROOT: /mnt/hdd
      # 터널 토큰은 cloudflared 서비스만 사용 → 백엔드엔 노출하지 않음(최소권한)
      CF_TUNNEL_TOKEN: ""
    volumes:
      - /mnt/hdd:/mnt/hdd

  frontend:
    build: ./frontend
    container_name: server-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # 웹 터미널 (admin 전용, 옵트인). 켜려면:
  #   .env에 ENABLE_TERMINAL=true, 그리고
  #   docker compose --profile terminal up -d --build
  # ⚠️ pid:host + privileged + nsenter로 호스트(라즈베리파이) 루트 셸에 접근한다.
  #    외부 노출 시 admin 비밀번호를 반드시 강하게 설정할 것.
  terminal:
    build: ./terminal
    container_name: server-terminal
    restart: unless-stopped
    profiles: ["terminal"]
    pid: "host"
    privileged: true
    environment:
      # 백엔드와 동일한 세션 비밀/솔트로 admin 토큰 검증 (최소 권한: 이 3개만 주입)
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-3600}
      TERMINAL_ADMINS: ${TERMINAL_ADMINS:-admin}

  # 4단계: 포트포워딩 없이 외부 접속 (Cloudflare Tunnel)
  # 사용하려면: 대시보드에서 터널 생성 후 토큰을 .env의 CF_TUNNEL_TOKEN에 넣고
  #   docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: server-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - frontend
